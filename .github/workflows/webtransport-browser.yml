---
name: "WebTransportBrowser"

on:
  push:
    branches:
      - master
      - webtransport_refresh
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wpt-adapter:
    name: WPT adapter gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout picoquic
        uses: actions/checkout@v5
        with:
          submodules: "recursive"

      - name: Checkout h3browserconformance
        uses: actions/checkout@v5
        with:
          repository: victorstewart/h3browserconformance
          path: h3browserconformance

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev openssl

      - name: Build pico_baton
        run: |
          cmake -S . -B build -DPICOQUIC_FETCH_PTLS:BOOL=ON
          cmake --build build -j$(nproc) --target pico_baton

      - name: Validate WPT adapter manifests
        run: |
          npx -y node@22 h3browserconformance/wpt/run-wpt.mjs list --json
          npx -y node@22 h3browserconformance/wpt/run-wpt.mjs list --expected h3browserconformance/wpt/expected/chrome-stable.json --json
          npx -y node@22 h3browserconformance/wpt/run-wpt.mjs list --expected h3browserconformance/wpt/expected/edge-stable.json --json
          npx -y node@22 h3browserconformance/wpt/run-wpt.mjs list --expected h3browserconformance/wpt/expected/firefox-stable.json --json
          npx -y node@22 h3browserconformance/wpt/run-wpt.mjs list --expected h3browserconformance/wpt/expected/safari-stable.json --json

      - name: Validate WPT invocation wiring
        run: |
          npx -y node@22 h3browserconformance/wpt/run-wpt.mjs run \
            --wpt-root h3browserconformance/wpt/fixtures/fake-wpt \
            --browser chrome \
            --test constructor.https.sub.any.js \
            --dry-run

      - name: Smoke-test WPT pico_baton adapter
        run: |
          npx -y node@22 h3browserconformance/wpt/run-wpt.mjs server-smoke \
            --implementation-root "$PWD" \
            --server-bin "$PWD/build/pico_baton"

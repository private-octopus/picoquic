---
name: "CITestsAEGIS"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  linux-aegis:
    name: CI-Tests-AEGIS-Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Build picoquic with AEGIS
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
          cmake -S . -B build-aegis \
            -DWITH_AEGIS=ON \
            -DPICOQUIC_FETCH_PTLS=ON \
            -DPICOQUIC_FETCH_AEGIS=ON
          cmake --build build-aegis --parallel $(nproc) --target picoquic_ct aegisperf

      - name: Run AEGIS unit tests
        run: |
          ./build-aegis/picoquic_ct -S . \
            aegis_cipher_suite \
            aegis_hp_vector \
            aegis128l \
            aegis256 \
            aegis_fallback \
            aegis_0rtt \
            aegis_retry \
            aegis_initial_aes

  windows-aegis:
    name: CI-Tests-AEGIS-Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Install build dependencies
        run: |
          choco install pkgconfiglite -y
          C:\vcpkg\vcpkg.exe install openssl:x64-windows

      - name: Configure picoquic with AEGIS
        run: |
          cmake -S . -B build-aegis -A x64 `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DWITH_AEGIS=ON `
            -DPICOQUIC_FETCH_PTLS=ON `
            -DPICOQUIC_FETCH_AEGIS=ON `
            -DWITH_OPENSSL=ON `
            -DWITH_FUSION=OFF `
            -DPTLS_WITH_FUSION=OFF

      - name: Build picoquic_ct
        run: cmake --build build-aegis --config Release --parallel --target picoquic_ct

      - name: Run AEGIS unit tests
        run: |
          .\build-aegis\Release\picoquic_ct.exe -S . `
            aegis_cipher_suite `
            aegis_hp_vector `
            aegis128l `
            aegis256 `
            aegis_fallback `
            aegis_0rtt `
            aegis_retry `
            aegis_initial_aes
